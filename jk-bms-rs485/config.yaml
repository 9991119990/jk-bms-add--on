name: JK BMS RS485 MQTT
version: "0.1.0"
slug: jk_bms_rs485_mqtt
description: Read JK BMS over RS485 and publish values to MQTT discovery
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
uart: true
options:
  serial_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5A9A000831-if00
  baud: 115200
  address: 0
  mqtt_host: 192.168.68.250
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  interval: 10
schema:
  serial_port: str
  baud: int
  address: int
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  interval: int
